version: '3'

services:
  nextjs:
    build: .
    restart: always
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      # Auth.js (next-auth v5) — set a strong AUTH_SECRET and your real public URL
      - AUTH_SECRET=change_me_in_production
      - AUTH_TRUST_HOST=true
      - AUTH_URL=https://your-domain.example
      # Receipt uploads live on the mounted data volume (survive redeploys)
      - UPLOAD_DIR=/app/data/uploads
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    ports:
      - "3000:3000"

  caddy:
    image: caddy:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nextjs

volumes:
  caddy_data:
  caddy_config:
